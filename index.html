    function generateVariants(bank, variantsCount, questionsPerVariant = 40) {
        const variants = {};
        for (let v = 1; v <= variantsCount; v++) {
            const startIdx = ((v - 1) * 5) % bank.length;
            const variantQuestions = [];
            for (let i = 0; i < questionsPerVariant; i++) {
                const bankIdx = (startIdx + i) % bank.length;
                if (bank[bankIdx]) {
                    const parts = bank[bankIdx].split('||');
                    variantQuestions.push({
                        text: parts[0],
                        options: [parts[1], parts[2], parts[3], parts[4], parts[5]],
                        correct: parseInt(parts[6])
                    });
                }
            }
            variants[v] = variantQuestions;
        }
        return variants;
    }

    });
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function loadTest() {
        const variant = parseInt(document.getElementById('variantSelect').value);
        const shouldShuffle = document.getElementById('shuffleCheckbox').checked;
        
        currentVariant = variant;
        let source = currentModule === 'web' ? webVariants[variant] : javaVariants[variant];
        currentQuestions = [...source];
        
        if (shouldShuffle) {
            currentQuestions = shuffleArray(currentQuestions);
        }
        
        userAnswers = new Array(currentQuestions.length).fill(null);
        answered = new Array(currentQuestions.length).fill(false);
        testActive = true;
        
        quizArea.style.display = 'block';
        totalCountSpan.innerText = currentQuestions.length;
        const moduleName = currentModule === 'web' ? 'ПМ04 (Web)' : 'ПМ03 (Java)';
        variantInfoSpan.innerHTML = `${moduleName} | Вариант ${currentVariant} | ${currentQuestions.length} вопросов`;
        
        renderQuestions();
        updateStats();
    }
    
    function renderQuestions() {
        if (!testActive) return;
        
        let html = '';
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            const isAnswered = answered[i];
            const selected = userAnswers[i];
            const correctIdx = q.correct;
            const moduleBadge = currentModule === 'web' ? 'web' : 'java';
            const moduleLabel = currentModule === 'web' ? 'Web (ПМ04)' : 'Java (ПМ03)';
            
            let optionsHtml = '';
            for (let optIdx = 0; optIdx < q.options.length; optIdx++) {
                let extraClass = '';
                if (isAnswered) {
                    if (optIdx === correctIdx) extraClass = 'correct';
                    if (optIdx === selected && selected !== correctIdx) extraClass = 'wrong';
                }
                const disabledClass = isAnswered ? 'disabled' : '';
                optionsHtml += `
                    <div class="option ${extraClass} ${disabledClass}" data-qidx="${i}" data-optidx="${optIdx}">
                        ${escapeHtml(q.options[optIdx])}
                    </div>
                `;
            }
            
            html += `
                <div class="question-card">
                    <div class="question-header">
                        <span class="q-num">Вопрос ${i + 1}</span>
                        <span class="module-badge ${moduleBadge}">${moduleLabel}</span>
                    </div>
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="options">
                        ${optionsHtml}
                    </div>
                </div>
            `;
        }
        
        questionsContainer.innerHTML = html;
        
        document.querySelectorAll('.option:not(.disabled)').forEach(opt => {
            opt.addEventListener('click', () => {
                const qidx = parseInt(opt.dataset.qidx);
                const optidx = parseInt(opt.dataset.optidx);
                if (answered[qidx]) return;
                answered[qidx] = true;
                userAnswers[qidx] = optidx;
                renderQuestions();
                updateStats();
            });
        });
    }
    
    function updateStats() {
        let correct = 0;
        for (let i = 0; i < currentQuestions.length; i++) {
            if (answered[i] && userAnswers[i] === currentQuestions[i].correct) correct++;
        }
        correctCountSpan.innerText = correct;
        
        const percent = Math.round((correct / currentQuestions.length) * 100);
        let message = '';
        if (correct === currentQuestions.length) {
            message = 'Результат: 100 процентов — отлично.';
        } else if (correct >= 30) {
            message = `Результат: ${correct}/${currentQuestions.length} (${percent} процентов) — хорошо.`;
        } else if (correct >= 20) {
            message = `Результат: ${correct}/${currentQuestions.length} (${percent} процентов) — удовлетворительно. Рекомендуется повторить материал.`;
        } else {
            message = `Результат: ${correct}/${currentQuestions.length} (${percent} процентов) — требуется дополнительная подготовка.`;
        }
        resultArea.innerHTML = `<div style="font-size:0.95rem;">${message}</div>`;
    }
    
    function resetAnswers() {
        if (!testActive) return;
        userAnswers = new Array(currentQuestions.length).fill(null);
        answered = new Array(currentQuestions.length).fill(false);
        renderQuestions();
        updateStats();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('startBtn').addEventListener('click', loadTest);
    document.getElementById('resetQuizBtn').addEventListener('click', resetAnswers);
    
    document.querySelector('.module-btn.web').classList.add('active');
</script>
</body>
</html>
